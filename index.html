<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasty Treats</title>
    <link rel="stylesheet" href="/tasty-treats.c2b0d9e4.css">
    <link rel="icon" href="/favicon.8b2f57bf.png" type="image/x-icon">
    <link rel="stylesheet" href="/tasty-treats.34df27b5.css">
    <script type="importmap">{"imports":{"4WWky":"/icons.7bd9dd61.svg"}}</script><script type="module" src="/tasty-treats.961078c9.js"></script><link rel="stylesheet" href="/tasty-treats.9f367d21.css"><script type="module" src="/tasty-treats.31b563d9.js"></script>
  </head>

  <body>
    <!-- Header & Hero -->
    <!-- AnaSayfa Başlık / Homepage Header -->

    <!-- AnaSayfa Hero / Homepage Hero -->


    <!-- Ana İçerik / Main Contents -->
    <div class="position-wrapper container">
      <!-- AnaSayfa Tüm Kategoriler / Homepage All Categories -->

<section class="container-allcategories light-theme-add" id="all-categories-box">
  <h2 style="display: none">Categories</h2>
  <button class="button-Allcategories isUse" id="allCategoriesButton" type="button">
    All categories
  </button>
  <div id="categoriesContainer" class="categories-container">
    <div class="scroll-content"></div>
  </div>
</section>

      <!-- AnaSayfa Popüler Tarifler / Homapage Popular Recipes -->

<section class="popular-recipes-section">
  <div class="popular-recipes-container">
    <h2 class="popular-recipes-title">Popular recipes</h2>
    <ul class="popular-recipes-list"></ul>
  </div>
</section>

      <!-- AnaSayfa Arama / Homepage Search -->

<div class="search-res-container light-theme-add">
  <section class="input-section">
    <h2 style="display: none">Search</h2>
    <div class="wrapper">
      <div class="search-wrapper">
        <label for="search-input" class="search-label">Search</label>
        <div class="search-input-wrapper">
          <svg class="search-icon" width="15" height="15">
            <use href="/icons.21bad73c.svg#search"></use>
          </svg>
          <input type="text" id="search-input" class="search-input" placeholder="Enter Text">
          <svg class="cancel-button-input" width="20">
            <use href="/icons.21bad73c.svg#icon-x"></use>
          </svg>
        </div>
      </div>
    </div>
    <div>
      <label class="search-label">Time</label>
      <select class="list-time list-filter">
        <option value="">All</option>
        <option value="5">5 min</option>
        <option value="10">10 min</option>
        <option value="15">15 min</option>
        <option value="20">20 min</option>
        <option value="25">25 min</option>
        <option value="30">30 min</option>
        <option value="35">35 min</option>
        <option value="40">40 min</option>
        <option value="45">45 min</option>
        <option value="50">50 min</option>
        <option value="55">55 min</option>
        <option value="60">60 min</option>
        <option value="65">65 min</option>
        <option value="70">70 min</option>
        <option value="75">75 min</option>
        <option value="80">80 min</option>
        <option value="85">85 min</option>
        <option value="90">90 min</option>
        <option value="95">95 min</option>
        <option value="100">100 min</option>
        <option value="105">105 min</option>
        <option value="110">110 min</option>
        <option value="115">115 min</option>
        <option value="120">120 min</option>
      </select>
    </div>
    <!-- Mutfak Listesi / List of Areas -->
    <div>
      <label class="search-label">Area</label>
      <select class="list-area list-filter">
        <option value="">All</option>
      </select>
    </div>
    <!-- Malzeme Listesi / List of Ingredients -->
    <div>
      <label class="search-label">Ingredients</label>
      <select class="list-ingred list-filter">
        <option value="">All</option>
      </select>
    </div>

    <div id="spinner" class="spinner">
      <div class="spinner-icon"></div>
    </div>
  </section>

  <section>
    <button class="clear-button">
      <svg class="svg-button-click" width="16" height="16">
        <use href="/icons.21bad73c.svg#icon-x" class="svg-icon-clean-button"></use>
      </svg>
      Reset the filter
    </button>
    <h2 style="display: none">Recipes</h2>
    <div id="image-container" class="image-container"></div>
    <div id="pagination" class="tui-pagination"></div>
  </section>
</div>

      <!-- Sipariş Popup / Order Now Modal -->

    </div>

    <!-- Modals/Popups -->
    <div class="backdrop-recipes is-hidden-modal">
      <!-- Tarif Detayları Popup / Recipe Details Modal -->

<div id="scroll-rec" class="modal-recipes is-hidden-modal">
  <div class="modal-recipes-js"></div>
  <button class="close-modal">
    <svg class="close-modal-icon" width="20" height="20">
      <use href="/icons.21bad73c.svg#icon-x"></use>
    </svg>
  </button>
  <div class="scroll-box"></div>
  <button class="save-recipes-btn">Add to favorite</button>
  <button class="give-rating-btn">Give a rating</button>
</div>

      <!-- Puanlama Popup / Rating Modal -->

    </div>
    <button id="scroll-button" class="scroll-button">&#9650;</button>
  </body>
</html>
